server {
    listen 80;
    
    # Substitua pelo domínio real que você apontará para a Oracle
    server_name chatbotapi.mooo.com;

    location / {
        # Encaminha para o container Node.js (nomeado 'app' no docker-compose)
        proxy_pass http://app:3001;
        proxy_http_version 1.1;
        
        # 🔥 CRUCIAL PARA WEBSOCKETS (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Evita timeout durante a geração do QR Code e pareamento do WhatsApp
        proxy_read_timeout 86400;
    }
}