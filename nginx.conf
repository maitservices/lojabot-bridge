# 1. BLOCO HTTP (Porta 80) - Força o redirecionamento para o site seguro
server {
    listen 80;
    server_name chatbotapi.mooo.com;
    
    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

# 2. BLOCO HTTPS (Porta 443) - A conexão verdadeira
server {
    listen 443 ssl;
    server_name chatbotapi.mooo.com;

    # Aponta para os certificados gerados pelo Certbot no host
    ssl_certificate /etc/letsencrypt/live/chatbotapi.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbotapi.mooo.com/privkey.pem;

    location / {
        # Encaminha para o container Node.js
        proxy_pass http://app:3001;
        proxy_http_version 1.1;
        
        # CRUCIAL PARA WEBSOCKETS (Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Evita timeout durante a geração do QR Code e pareamento do WhatsApp
        proxy_read_timeout 86400;
    }
}