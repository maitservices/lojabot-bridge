version: '3.8'

services:
  app:
    build: .
    container_name: lojabot_node
    restart: unless-stopped
    env_file: .env
    # Mapeia as sessões do WhatsApp para o disco. Se o container reiniciar, a loja não cai!
    volumes:
      - ./.wwebjs_auth:/usr/src/app/.wwebjs_auth

  nginx:
    image: nginx:alpine
    container_name: lojabot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app